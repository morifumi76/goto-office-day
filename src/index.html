<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出社カレンダー</title>
<style>
  /* ===== 配色（ライトテーマ） ===== */
  :root{
    --yellow:#ffe066;          /* 出社日の塗り */
    --yellow-border:#f5c518;   /* 出社日の枠 */
    --green:#a8e6a1;           /* 帰省日の塗り */
    --green-border:#4caf50;    /* 帰省日の枠 */
    --today:#3b82f6;           /* 今日の枠線（青） */
    --holiday-bg:#fdeaea;      /* 土日祝の背景（うっすら赤） */
    --holiday-text:#c0392b;    /* 土日祝の文字 */
    --text:#37352f;            /* 通常の文字（Notion標準の黒） */
    --muted:#9b9a97;           /* 補足テキスト（曜日・カウント） */
    --bg:#ffffff;              /* 全体背景 */
    --hover:#f1f1ef;           /* マウスホバー時 */
    --sat:#2f80ed;             /* 土曜の曜日見出し */
    --sun:#eb5757;             /* 日曜の曜日見出し */
  }

  /* ===== 配色（ダークテーマ：Notionのダークモードに馴染ませる） ===== */
  @media (prefers-color-scheme: dark){
    :root{
      --yellow:#9c8728;         /* 暗い背景でも沈まない出社日色 */
      --yellow-border:#d8b620;
      --green:#3f7a44;          /* 暗い背景でも沈まない帰省日色 */
      --green-border:#5fae63;
      --today:#5b9bff;
      --holiday-bg:#3a2526;     /* うっすら赤（暗め） */
      --holiday-text:#ff9a8d;
      --text:#e9e8e6;
      --muted:#8d8b86;
      --bg:#191919;
      --hover:#2a2a2a;
      --sat:#6ea8ff;
      --sun:#ff7a7a;
    }
  }

  *{ box-sizing:border-box; }
  body{
    font-family:-apple-system,"Helvetica Neue","Hiragino Sans",sans-serif;
    margin:0; padding:16px; background:var(--bg); color:var(--text);
  }

  .wrap{ display:flex; gap:16px; flex-wrap:wrap; justify-content:center; }
  .month{ flex:1 1 260px; max-width:320px; min-width:230px; }
  .month h2{ font-size:15px; text-align:center; margin:0 0 8px; }
  .count{ font-size:12px; color:var(--muted); font-weight:normal; }

  table{ width:100%; border-collapse:collapse; table-layout:fixed; }
  th{ font-size:11px; color:var(--muted); padding:4px 0; font-weight:600; }
  th.sat{ color:var(--sat); } th.sun{ color:var(--sun); }
  td{ text-align:center; padding:1px; }

  .day{
    width:100%; aspect-ratio:1/1; border:1px solid transparent;
    background:transparent; border-radius:8px; cursor:pointer;
    font-size:13px; color:var(--text); display:flex;
    align-items:center; justify-content:center; transition:background .12s;
    font-family:inherit;
  }
  .day:hover{ background:var(--hover); }
  .day:focus-visible{ outline:2px solid var(--today); outline-offset:1px; }
  .day.empty{ cursor:default; }
  .day.holiday{ background:var(--holiday-bg); color:var(--holiday-text); }
  .day.on{ background:var(--yellow); border-color:var(--yellow-border); color:var(--text); font-weight:600; }
  .day.home{ background:var(--green); border-color:var(--green-border); color:var(--text); font-weight:600; }
  /* 祝日・土日を出社/帰省に塗った場合：塗りはそのまま、数字だけ赤くして「休みなのに予定あり」と分かるようにする */
  .day.holiday.on,
  .day.holiday.home{ color:var(--holiday-text); }
  .day.today{ outline:2px solid var(--today); outline-offset:-2px; }
  /* 過去の日付はうっすら薄く（これからの予定に視線を向ける）。塗り・今日枠は残す */
  .day.past{ opacity:.45; }
  .day.past.on,
  .day.past.home{ opacity:.7; }

  /* 同期の状態表示（通常は控えめ、エラー時だけ赤く） */
  .status{ text-align:center; font-size:11px; color:var(--muted); min-height:1.2em; margin:8px 0 0; }
  .status.error{ color:var(--sun); }
</style>
</head>
<body>
  <div class="wrap" id="wrap"></div>
  <p id="status" class="status" role="status" aria-live="polite"></p>
<script>
  // ===== 設定（基本ここだけ触ればOK） =====
  const STORAGE_KEY = "nagoya-shukkin-days";   // 出社日の保存名（localStorageのキー）
  const HOME_STORAGE_KEY = "nagoya-kisei-days"; // 帰省日（家に行く日）の保存名
  const HOME_LABEL = "帰省";                    // 緑の予定の呼び名（「実家」「岡山」などに変えてOK）
  // 複数端末で色を共有したいときは、Apps ScriptのウェブアプリURL（末尾 /exec）をここに貼る。
  // 空のままなら、従来どおりこの端末の中だけに保存する（設定方法は docs/sync-setup.md 参照）。
  const SYNC_URL = "https://script.google.com/macros/s/AKfycby0JN_P7-pb_ElWSUfdzwTcHp4o_wpV5v3zA2N7NwJQ57uOjO5VMghk6LUZrKk0Xn_U/exec";
  const WEEK = ["月","火","水","木","金","土","日"]; // 月曜始まり

  // 祝日・休日（内閣府の確定値）。
  // 毎年2月ごろに翌年分が確定するので、年明けに1行追記してね（土日は自動判定なので不要）。
  const HOLIDAYS = new Set([
    // 2026年
    "2026-01-01","2026-01-12","2026-02-11","2026-02-23","2026-03-20",
    "2026-04-29","2026-05-03","2026-05-04","2026-05-05","2026-05-06",
    "2026-07-20","2026-08-11","2026-09-21","2026-09-22","2026-09-23",
    "2026-10-12","2026-11-03","2026-11-23",
    // 2027年
    "2027-01-01","2027-01-11","2027-02-11","2027-02-23","2027-03-21",
    "2027-03-22","2027-04-29","2027-05-03","2027-05-04","2027-05-05",
    "2027-07-19","2027-08-11","2027-09-20","2027-09-23","2027-10-11",
    "2027-11-03","2027-11-23"
  ]);
  // ===================================

  // localStorageの読み書き（壊れた値でも落ちないように try-catch）
  function loadDays(key){
    try{ return new Set(JSON.parse(localStorage.getItem(key) || "[]")); }
    catch(e){ return new Set(); }
  }
  function saveDays(key, set){
    try{ localStorage.setItem(key, JSON.stringify([...set])); }
    catch(e){ /* 保存できなくても操作は続行できるようにする */ }
  }

  // 日付を "YYYY-MM-DD" 文字列に変換（保存キーとして使う）
  function ymd(y,m,d){ return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`; }

  // 指定した集合（出社 or 帰省）の、その年月の日数を数える
  function countInMonth(set,y,m){
    const prefix=`${y}-${String(m+1).padStart(2,"0")}-`;
    let c=0; set.forEach(k=>{ if(k.startsWith(prefix)) c++; });
    return c;
  }

  const office = loadDays(STORAGE_KEY);     // 黄色：出社日
  const home   = loadDays(HOME_STORAGE_KEY); // 緑：帰省日

  // 端末内のキャッシュに保存（オフラインでも直前の状態を表示できるようにする）
  function cacheLocal(){
    saveDays(STORAGE_KEY, office);
    saveDays(HOME_STORAGE_KEY, home);
  }

  // 画面下の状態メッセージを表示（isError=true で赤く）
  function setStatus(msg, isError){
    const el = document.getElementById("status");
    el.textContent = msg || "";
    el.classList.toggle("error", !!isError);
  }

  // サーバー（Apps Script）から全データを読み込む → {office:[...], home:[...]}
  async function fetchData(){
    const res = await fetch(SYNC_URL, { method:"GET" });
    if(!res.ok) throw new Error("読み込み失敗 " + res.status);
    return await res.json();
  }

  // 1日分の変更をサーバーへ保存（type は "office" / "home" / "none"）。
  // 本文を文字列で送ると Content-Type が text/plain になり、CORSの事前確認(preflight)を避けられる。
  async function pushChange(date, type){
    const res = await fetch(SYNC_URL, { method:"POST", body: JSON.stringify({ date, type }) });
    if(!res.ok) throw new Error("保存失敗 " + res.status);
  }

  // サーバーから受け取ったデータで画面を置き換える
  function applyData(data){
    office.clear(); (data.office || []).forEach(k=> office.add(k));
    home.clear();   (data.home   || []).forEach(k=> home.add(k));
    cacheLocal();
    render();
  }

  // 今の状態（出社・帰省）を1つの文字列にまとめる。再取得した内容と同じか比べるのに使う。
  function signature(office_, home_){
    return [...office_].sort().join(",") + "|" + [...home_].sort().join(",");
  }

  // ===== 同期の状態管理 =====
  let pendingWrites = 0;               // 送信中（保存中）の件数
  let writeSeq = 0;                    // 変更のたびに増える通し番号。古い取得結果を捨てる判定に使う
  let writeChain = Promise.resolve();  // 保存を1件ずつ順番に実行するための待ち行列

  // 1日分の変更をサーバーへ順番に保存する（連打しても順序が崩れない）
  function queueWrite(date, type){
    writeSeq++;
    pendingWrites++;
    writeChain = writeChain
      .then(()=> pushChange(date, type))
      .catch(()=> setStatus("保存に失敗しました（通信エラー）", true))
      .finally(()=>{ pendingWrites--; });
  }

  // サーバーから最新データを取得して画面へ反映する。
  // ただし保存中・取得中に変更があった場合は、古いデータで上書きしないよう破棄する。
  function refresh(){
    if(pendingWrites > 0) return Promise.resolve(); // 保存中は触らない
    const seq = writeSeq;                            // 取得開始時点の番号を覚えておく
    return fetchData().then(data=>{
      // 取得している間に手元で変更があった／保存が始まったら、その結果は古いので捨てる
      if(seq !== writeSeq || pendingWrites > 0) return;
      // 中身が今と同じなら、塗り直さない（無駄なちらつき・操作の邪魔を防ぐ）
      const incoming = signature(new Set(data.office || []), new Set(data.home || []));
      if(incoming !== signature(office, home)) applyData(data);
      setStatus("", false);
    });
  }

  const today = new Date();
  const todayStr = ymd(today.getFullYear(), today.getMonth(), today.getDate());

  // 表示する3ヶ月（今月・来月・再来月）の {年, 月} を計算
  function targetMonths(){
    const list=[];
    for(let i=0;i<3;i++){
      const base=today.getMonth()+i;
      const y=today.getFullYear()+Math.floor(base/12);
      const m=((base%12)+12)%12; // 0〜11に正規化（年またぎも自動）
      list.push({y,m});
    }
    return list;
  }

  // 1ヶ月分のカレンダーを組み立てる
  function buildMonth(year, month){
    const box=document.createElement("div"); box.className="month";

    const title=document.createElement("h2");
    const setTitle=()=> title.innerHTML=`${year}年 ${month+1}月 <span class="count">（出社 ${countInMonth(office,year,month)}日）</span>`;
    setTitle(); box.appendChild(title);

    const table=document.createElement("table");

    // 曜日の見出し行
    const trh=document.createElement("tr");
    WEEK.forEach((w,i)=>{
      const th=document.createElement("th"); th.textContent=w; th.scope="col";
      if(i===5)th.className="sat"; if(i===6)th.className="sun";
      trh.appendChild(th);
    });
    table.appendChild(trh);

    const firstWeekday=(new Date(year,month,1).getDay()+6)%7; // 月曜=0 に変換
    const lastDate=new Date(year,month+1,0).getDate();
    let date=1;

    for(let row=0; row<6; row++){
      const tr=document.createElement("tr");
      for(let col=0; col<7; col++){
        const td=document.createElement("td");
        if(row*7+col<firstWeekday || date>lastDate){
          // 月初の空白・月末以降の空白マス
          const e=document.createElement("div"); e.className="day empty"; td.appendChild(e);
        } else {
          const d=date, key=ymd(year,month,d);
          const dow=new Date(year,month,d).getDay(); // 0=日, 6=土
          const isHoliday = (dow===0 || dow===6 || HOLIDAYS.has(key));

          const btn=document.createElement("button");
          btn.className="day"; btn.textContent=d; btn.type="button";

          if(isHoliday) btn.classList.add("holiday");
          if(office.has(key)) btn.classList.add("on");
          else if(home.has(key)) btn.classList.add("home");
          if(key===todayStr) btn.classList.add("today");
          if(key < todayStr) btn.classList.add("past"); // 過去の日付はうっすら薄く

          // 読み上げ用ラベルとトグル状態（アクセシビリティ）を、現在の状態に合わせて設定する
          const setA11y=()=>{
            const state = office.has(key) ? "出社" : home.has(key) ? HOME_LABEL : "";
            btn.setAttribute("aria-label", `${year}年${month+1}月${d}日${isHoliday?"（休み）":""}${state?"："+state:""}`);
            btn.setAttribute("aria-pressed", (office.has(key)||home.has(key)) ? "true" : "false");
          };
          setA11y();

          // クリックで3状態をトグル（黄色＝出社 → 緑＝帰省 → 解除）
          btn.addEventListener("click", ()=>{
            let newType;
            if(office.has(key)){
              // 黄色 → 緑
              office.delete(key); home.add(key);
              btn.classList.remove("on"); btn.classList.add("home"); newType="home";
            } else if(home.has(key)){
              // 緑 → 解除
              home.delete(key); btn.classList.remove("home"); newType="none";
            } else {
              // 解除 → 黄色
              office.add(key); btn.classList.add("on"); newType="office";
            }
            setA11y();
            cacheLocal(); setTitle();
            // SYNC_URL が設定されていればサーバーにも順番に保存（失敗しても画面の操作は続けられる）
            if(SYNC_URL){
              queueWrite(key, newType);
            }
          });

          td.appendChild(btn); date++;
        }
        tr.appendChild(td);
      }
      table.appendChild(tr);
      if(date>lastDate) break; // 残りの空行は作らない
    }
    box.appendChild(table);
    return box;
  }

  // 全体を描画
  function render(){
    const wrap=document.getElementById("wrap"); wrap.innerHTML="";
    targetMonths().forEach(({y,m})=> wrap.appendChild(buildMonth(y,m)));
  }

  // まずは端末内のキャッシュで即表示（待たせない）
  render();

  // SYNC_URL があれば、サーバーの最新データで上書きして共有状態にする
  if(SYNC_URL){
    setStatus("同期中…", false);
    refresh().catch(()=> setStatus("同期できませんでした（この端末の表示のままです）", true));

    // 別端末で更新された内容を拾うため、タブを切り替えて戻ってきたとき（=再表示時）だけ静かに再取得する。
    // iframe内のクリックでは発火しないので、操作中に勝手に色が塗り替わることはない。
    document.addEventListener("visibilitychange", ()=>{
      if(document.visibilityState === "visible") refresh().catch(()=>{});
    });
  }
</script>
</body>
</html>
